<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reduslim - средство для похудения</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">
  <link rel="stylesheet" href="./styles/fonts.css">
  <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
  <main class="main">
    <section class="order-form">
      <div class="container">
        <div class="row">
          <div class="col-md-6 order-form-left d-flex flex-column">
            <h2 class="visually-hidden">Форма заказа Reduslim</h2>
            <span class="order-form-left__logo">Reduslim</span>
            <img class="order-form-left__img img-fluid" src="./images/capsules-desktop.png" alt="Фотография продукта Reduslim" width="465" height="255">
            <span class="order-form-left__subtitle">ECO</span>
          </div>
    
          <div class="col-md-6 order-form-right">
            <p class="order-form-right__title">Сделай шаг к выздоровлению</p>

            <form action="#" class="form">
              <div class="form__wrap">
                <p class="d-flex flex-column name">
                  <label for="name" class="label">Ваше <span>имя</span></label>
                  <input type="text" id="name" placeholder="Алексей">
                </p>
                <div class="form-fields">
                  <p class="tel">
                    <label for="tel" class="label">Ваш <span>телефон</span></label>
                    <input type="tel" id="tel" placeholder="+7 (123) 456 78-90">
                  </p>
                  <div class="select-box">
                    <div class="select-box__current" tabindex="1">
                  
                      <div class="select-box__value">
                        <input class="select-box__input" type="radio" id="0" value="1" name="Ben" checked="checked" />
                        <p class="select-box__input-text">RU <img src="./images/flag-ru.svg" alt="Флаг России" width="27" height="18"></p>
                      </div>
                      <div class="select-box__value">
                        <input class="select-box__input" type="radio" id="1" value="2" name="Ben" />
                        <p class="select-box__input-text">Ra <img src="./images/flag-ru.svg" alt="Флаг России" width="27" height="18"></p>
                      </div>
                      <div class="select-box__value">
                        <input class="select-box__input" type="radio" id="2" value="3" name="Ben" />
                        <p class="select-box__input-text">Ro <img src="./images/flag-ru.svg" alt="Флаг России" width="27" height="18"></p>
                      </div>
                  
                      <img class="select-box__icon" src="./images/angle.svg" alt="Открыть страны" aria-hidden="true" width="11" height="6">
                    </div>
                  
                    <ul class="select-box__list">
                      <li>
                        <label class="select-box__option" for="0" aria-hidden="aria-hidden">RU <img src="./images/flag-ru.svg" alt="Флаг России" width="27" height="18"></label>
                      </li>
                      <li>
                        <label class="select-box__option" for="1" aria-hidden="aria-hidden">Ra <img src="./images/flag-ru.svg" alt="Флаг России" width="27" height="18"></label>
                      </li>
                      <li>
                        <label class="select-box__option" for="2" aria-hidden="aria-hidden">Ro <img src="./images/flag-ru.svg" alt="Флаг России" width="27" height="18"></label>
                      </li>
                    </ul>
                  </div>
                </div>
                <button type="submit" class="button">
                  <span>Заказать</span>
                  <img src="./images/arrow.svg" alt="" width="18" height="12">
                </button>
              </div>
            </form>

            <div class="hidden-footer">
              <span>Trusted</span>
              <img src="./images/lock.svg" alt="" width="13" height="15">
              <span>Secure</span>
            </div>
          </div>


        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-U1DAWAznBHeqEIlVSCgzq+c9gqGAJn5c/t99JyeKa9xxaYpSvHU5awsuZVVFIhvj" crossorigin="anonymous"></script>
  <script src="./scripts/scripts.js"></script>
</body>
</html>
